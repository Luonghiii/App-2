<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOCKET GOLD - Luonghiii</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/Y7d5zS6k/IMG-8541.jpg" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'csa-gold': '#FFD700',
              'csa-red': '#d63031',
              'csa-green': '#00b894',
            }
          }
        }
      }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

        :root {
            --bg-base: #18181B;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(212, 175, 55, 0.2);
            --gold-accent: #D4AF37;
            --gold-gradient: linear-gradient(135deg, #F6D365 0%, #FDA085 100%);
            --text-main: #F9FAFB;
            --text-muted: #9CA3AF;
            --danger: #EF4444;
            --success: #10B981;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.1), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.08), transparent 25%);
            background-attachment: fixed;
        }

        .app-box { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            border-radius: 16px; 
            padding: 24px; 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .gold-text {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .serif-title {
            font-family: 'Playfair Display', serif;
        }
        
        .app-toast {
            position: fixed; top: 24px; right: 24px; z-index: 10000;
            background: var(--gold-gradient); color: #000; border-radius: 12px; padding: 16px 20px; 
            display: flex; align-items: center; gap: 12px; font-weight: 600;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3); transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .app-toast.show { transform: translateX(0); }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "vite": "https://aistudiocdn.com/vite@^7.1.12",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.0.4"
  }
}
</script>
</head>
<body class="custom-scrollbar">
    <div id="root"></div>

</body>
</html>
